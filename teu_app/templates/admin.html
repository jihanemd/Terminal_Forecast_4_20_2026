<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Lanes — Terminal L/D</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .filter-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
    .filter-btn{height:30px;padding:0 14px;border-radius:99px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s;font-family:var(--sans)}
    .filter-btn.active{background:var(--ink);color:var(--white);border-color:var(--ink)}
    .filter-btn.fg.active{background:#065F46;border-color:#065F46}
    .filter-btn.fa.active{background:#78350F;border-color:#78350F}
    .filter-btn.fr.active{background:#7F1D1D;border-color:#7F1D1D}
    .admin-search{height:30px;padding:0 12px;font-size:13px;font-family:var(--sans);color:var(--ink);background:var(--white);border:1px solid var(--border);border-radius:var(--radius);outline:none;margin-left:auto}
    .admin-search:focus{border-color:var(--blue)}
    .fb{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:500;font-family:var(--mono)}
    .fb-fresh   {background:#D1FAE5;color:#065F46}
    .fb-stale   {background:#FEF3C7;color:#92400E}
    .fb-outdated{background:#FEE2E2;color:#7F1D1D}
    .fb-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
    .fb-fresh .fb-dot{background:#10B981}.fb-stale .fb-dot{background:#F59E0B}.fb-outdated .fb-dot{background:#EF4444}
    .mini-bar{height:6px;border-radius:99px;background:var(--border);overflow:hidden;display:flex;width:80px}
    .mb-l{background:var(--blue);height:100%}.mb-d{background:var(--coral);height:100%}
    .tbl-count{font-size:12px;color:var(--muted);font-family:var(--mono)}
  </style>
</head>
<body>
<div class="app-layout">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="5" width="16" height="8" rx="2" stroke="white" stroke-width="1.5"/><path d="M5 5V4a4 4 0 018 0v1" stroke="white" stroke-width="1.5" stroke-linecap="round"/><path d="M6 9h6M9 7v4" stroke="white" stroke-width="1.4" stroke-linecap="round"/></svg></div>
      <div><div class="brand-name">Terminal L/D</div><div class="brand-sub">Predictor</div></div>
    </div>
    <div class="sidebar-section-label">Navigation</div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="/"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 12V6l6-4 6 4v6a1 1 0 01-1 1H3a1 1 0 01-1-1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M6 13V9h4v4" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg><span>Prediction</span></a>
      <a class="nav-item" href="/#import-teu"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M4 5h8M4 8h8M4 11h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M11 9v4M9 11l2 2 2-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Import TEU</span></a>
      <a class="nav-item" href="/#update"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v5l3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 2v5l-3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg><span>Update</span></a>
    </nav>
    <div class="sidebar-section-label" style="margin-top:8px">Tools</div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="/admin"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/></svg><span>Admin lanes</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-stats">
        <div class="ss-item"><span class="ss-val" id="sidebarLaneCount">—</span><span class="ss-lbl">lanes</span></div>
      </div>
      <button class="theme-toggle" onclick="toggleDarkMode()">
        <svg id="iconMoon" width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M13 9.5A5.5 5.5 0 015.5 2a6.5 6.5 0 100 11A5.5 5.5 0 0113 9.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        <svg id="iconSun"  width="14" height="14" viewBox="0 0 15 15" fill="none" style="display:none"><circle cx="7.5" cy="7.5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Dark mode
      </button>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main-content">
    <div class="page-header">
      <h1>Admin — Lane Management</h1>
      <p>Detailed view of all lanes and freshness indicators.</p>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-icon-wrap kpi-blue"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/></svg></div><div><div class="kpi-num" id="kpiTotal">—</div><div class="kpi-lbl">Total lanes</div></div></div>
      <div class="kpi-card kpi-green"><div class="kpi-icon-wrap kpi-ig"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div class="kpi-num" id="kpiFresh">—</div><div class="kpi-lbl">Recent</div></div></div>
      <div class="kpi-card kpi-amber"><div class="kpi-icon-wrap kpi-ia"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2L14.5 13.5H1.5L8 2Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M8 6.5v3M8 11v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div><div><div class="kpi-num" id="kpiStale">—</div><div class="kpi-lbl">To refresh</div></div></div>
      <div class="kpi-card kpi-red"><div class="kpi-icon-wrap kpi-ir"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 5.5v3.5M8 11v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div><div><div class="kpi-num" id="kpiOut">—</div><div class="kpi-lbl">Outdated</div></div></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <span class="card-title-sm">All lanes</span>
        <span class="tbl-count" id="tblCount"></span>
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn fg" onclick="setFilter('fresh',this)">🟢 Recent</button>
        <button class="filter-btn fa" onclick="setFilter('stale',this)">🟡 To refresh</button>
        <button class="filter-btn fr" onclick="setFilter('outdated',this)">🔴 Outdated</button>
        <input class="admin-search" type="text" id="adminSearch" placeholder="Search…" oninput="filterTable()">
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Lane</th><th>Freshness</th><th>Last date</th><th>% L</th><th>% D</th><th>Ratio</th><th>Calls</th><th>Avg. L</th><th>Avg. D</th></tr></thead>
          <tbody id="adminBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="toastContainer"></div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
let allAdminLanes = [], currentFilter = 'all';

document.addEventListener('DOMContentLoaded', () => {
  initDarkMode();
  fetch('/api/lanes/details').then(r=>r.json()).then(d=>{
    allAdminLanes = d.lanes;
    const n = d.lanes.length;
    animateNum('kpiTotal', n);
    animateNum('kpiFresh', d.lanes.filter(l=>l.freshness==='fresh').length);
    animateNum('kpiStale', d.lanes.filter(l=>l.freshness==='stale').length);
    animateNum('kpiOut',   d.lanes.filter(l=>l.freshness==='outdated').length);
    const s = document.getElementById('sidebarLaneCount'); if(s) s.textContent = n;
    renderTable(allAdminLanes);
  }).catch(e=>showToast('Loading error','error'));
});

function renderTable(lanes) {
  document.getElementById('tblCount').textContent = `${lanes.length} lane(s)`;
  document.getElementById('adminBody').innerHTML = lanes.map(l=>`
    <tr>
      <td class="td-lane">${l.lane}</td>
      <td><span class="fb fb-${l.freshness}"><span class="fb-dot"></span>${l.freshness==='fresh'?'Recent':l.freshness==='stale'?'To refresh':'Outdated'}</span></td>
      <td style="font-family:var(--mono);font-size:12px">${l.last_date}</td>
      <td style="font-family:var(--mono);color:var(--blue)">${l.pct_L.toFixed(1)}%</td>
      <td style="font-family:var(--mono);color:var(--coral)">${l.pct_D.toFixed(1)}%</td>
      <td><div class="mini-bar"><div class="mb-l" style="width:${l.pct_L}%"></div><div class="mb-d" style="width:${l.pct_D}%"></div></div></td>
      <td style="font-family:var(--mono)">${l.n_voyages}</td>
      <td style="font-family:var(--mono)">${Math.round(l.avg_L)}</td>
      <td style="font-family:var(--mono)">${Math.round(l.avg_D)}</td>
    </tr>`).join('');
}
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterTable();
}
function filterTable() {
  const q = document.getElementById('adminSearch').value.toLowerCase();
  let lanes = allAdminLanes;
  if (currentFilter !== 'all') lanes = lanes.filter(l=>l.freshness===currentFilter);
  if (q) lanes = lanes.filter(l=>l.lane.toLowerCase().includes(q));
  renderTable(lanes);
}
</script>
</body>
</html>
